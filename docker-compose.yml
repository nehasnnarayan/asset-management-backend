version: '3.8'

services:
  db:
    image: postgres:15
    container_name: assettrack_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asset_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the dump file to automatically initialize the database on first run
      - ./database_dump.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: assettrack_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/asset_management
    depends_on:
      - db
    # We alter the models.py database URL inside the container if needed by injecting environment variable or just relying on internal networking. Wait, in database.py we hardcoded localhost.
    # In docker, it needs to connect to `db` not `localhost`.
    
volumes:
  postgres_data:
